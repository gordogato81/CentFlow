<div mat-dialog-content (resize)="onWindowResize()">
  <div class="dialog-content">
    <!-- <div class="card-header"> -->
    <mat-card id="card">
      <div id="form-fields">
        <mat-form-field appearance="fill" class="field">
          <mat-label>Select Chart Scaling</mat-label>
          <mat-select
            [(value)]="chartScaleDialog"
            (valueChange)="onChangeChartScale($event)"
          >
            <mat-option value="linear">Linear Scaling</mat-option>
            <mat-option value="sqrt">Square Root Scaling</mat-option>
            <mat-option value="log">Logarithmic Scaling</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="fill" class="field">
          <mat-label>Select Map Scaling</mat-label>
          <mat-select
            [(value)]="mapScaleDialog"
            (valueChange)="onChangeMapScale($event)"
          >
            <mat-option value="linear">Linear Scaling</mat-option>
            <mat-option value="sqrt">Square Root Scaling</mat-option>
            <mat-option value="log">Logarithmic Scaling</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <h2 id="info">
        CID: {{ CID }}, Total Fishing Hours: {{ tfh }}, <br />
        Start Date: {{ startDate }}, End Date: {{ endDate }}
      </h2>
      <svg #legend id="legend"></svg>
    </mat-card>
    <!-- </div> -->
    <div #dialogContent class="content" id="dialogContent">
      <div #dialogChart id="dChart">
      </div>
      <div #dialogMap id="dMap"></div>
      <div #tooltipViz id="tooltipViz"></div>
    </div>
  </div>
</div>
