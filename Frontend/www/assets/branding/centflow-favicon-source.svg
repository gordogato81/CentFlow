<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">CentFlow favicon source</title>
  <desc id="desc">A stylized amber route marker on a pale blue map tile.</desc>
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bcdbe6" />
      <stop offset="100%" stop-color="#96bfcc" />
    </linearGradient>
    <linearGradient id="route" x1="20%" y1="10%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffc533" />
      <stop offset="100%" stop-color="#f29d00" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#38505a" flood-opacity="0.25" />
    </filter>
  </defs>

  <rect width="64" height="64" rx="13" fill="url(#tile)" />

  <g filter="url(#shadow)">
    <path
      d="M16 15 L47.5 31 L32 52 L27.5 38.5 L13.5 20.5 Z"
      fill="url(#route)"
      stroke="#d48d00"
      stroke-linejoin="round"
      stroke-width="2"
    />
    <path
      d="M17.5 15.5 L41 28.5 L16 22.5 Z"
      fill="#ffd567"
      fill-opacity="0.45"
    />
    <path
      d="M18 14 L43 31.5 L31.5 50.5"
      fill="none"
      stroke="#131313"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="5"
    />

    <g fill="#101010" stroke="#ffffff" stroke-width="2">
      <circle cx="18" cy="14" r="6.7" />
      <circle cx="43" cy="31.5" r="6.7" />
      <circle cx="31.5" cy="50.5" r="6.7" />
    </g>
  </g>
</svg>
